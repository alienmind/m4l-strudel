name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: the tag must be the version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          ROOT=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$ROOT" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $ROOT"
            exit 1
          fi
          echo "releasing $ROOT"

      - run: pnpm build
      - run: pnpm test

      - name: github release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/m4l-strudel/*.amxd
            dist/m4l-strudel.zip
