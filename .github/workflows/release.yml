name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: the tag must be the version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          ROOT=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$ROOT" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $ROOT"
            exit 1
          fi
          echo "releasing $ROOT"

      # The Strudel device's Studio window is the real strudel.cc, built from the
      # submodule into dist/repl-site and shipped as a folder beside the .amxd. It is
      # NOT in git, so CI has to build it - without this the packaging step stops with
      # "declares site dist/repl-site, but there is no index.html there", which is the
      # guard doing its job: a device released without that folder opens an empty
      # Studio.
      - name: install the strudel submodule's dependencies
        run: pnpm --dir strudel install --ignore-scripts

      - name: build the offline strudel.cc bundle
        run: pnpm build:repl

      - run: pnpm build
      - run: pnpm test

      - name: github release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/m4l-strudel/*.amxd
            dist/m4l-strudel.zip
