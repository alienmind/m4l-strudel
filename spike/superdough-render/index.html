<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>S1 - superdough offline render spike</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; max-width: 680px; margin: 2rem auto; padding: 0 1rem; }
      button { font: inherit; padding: 6px 12px; margin: 2px 4px 2px 0; cursor: pointer; }
      input, textarea { font: inherit; }
      textarea { width: 100%; height: 5rem; box-sizing: border-box; }
      #log { white-space: pre-wrap; background: #111; color: #ddd; padding: 12px; border-radius: 6px; min-height: 6rem; }
      .row { margin: 8px 0; }
      .ok { color: #3c3; } .err { color: #f66; }
    </style>
  </head>
  <body>
    <h1>S1 - superdough offline render spike</h1>
    <p>
      Proves the load-bearing claim of the SUPERDOUGH Rendering design: the REAL superdough
      (worklets, samples, effects) renders inside an <code>OfflineAudioContext</code> in
      Chromium, and the WAV encoder produces a playable file. If Play sounds right, S1 passes.
    </p>
    <div class="row">
      <textarea id="code">s("bd sd").lpf(800).room(.5)</textarea>
    </div>
    <div class="row">
      cps <input id="cps" type="number" value="0.5" step="0.1" style="width:5rem" />
      cycles <input id="cycles" type="number" value="2" step="1" style="width:4rem" />
      <button id="render">Render</button>
      <button id="play" disabled>Play</button>
      <button id="download" disabled>Download WAV</button>
    </div>
    <div id="log"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
